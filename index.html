<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warehouse Dimensions Logger</title>
    <style>
        /* CSS Variables for Theming */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-bg: #ffffff;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --error-bg: #fee2e2;
            --error-text: #991b1b;
        }

        /* Dark Mode Theme */
        [data-theme="dark"] {
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --bg-color: #0f172a;
            --surface: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
            --success-bg: #064e3b;
            --success-text: #34d399;
            --error-bg: #7f1d1d;
            --error-text: #f87171;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            background-color: var(--surface);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
            transition: background-color 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        h2 {
            margin: 0;
            font-size: 20px;
        }

        /* Theme Toggle Switch */
        .theme-switch {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .section-title {
            font-size: 16px;
            color: var(--primary);
            margin: 24px 0 12px 0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 480px) {
            .form-grid.two-cols { grid-template-columns: 1fr 1fr; }
            .form-grid.three-cols { grid-template-columns: 1fr 1fr 1fr; }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px; /* Prevents iOS auto-zoom */
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button[type="submit"] {
            width: 100%;
            padding: 16px;
            margin-top: 32px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button[type="submit"]:hover { background-color: var(--primary-hover); }
        button[type="submit"]:disabled { opacity: 0.7; cursor: not-allowed; }

        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        .success { background-color: var(--success-bg); color: var(--success-text); display: block; }
        .error { background-color: var(--error-bg); color: var(--error-text); display: block; }

        /* History Section Styles */
        .history-section {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: none; /* Hidden by default until there is data */
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            background-color: var(--bg-color);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .history-name {
            font-weight: 600;
            color: var(--text-main);
        }

        .history-time {
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Dimensions Logger</h2>
        <button class="theme-switch" id="theme-toggle" type="button">
            <span id="theme-icon">🌙</span> Dark Mode
        </button>
    </div>

    <form id="dimensions-form">
        
        <div class="section-title">Product Info</div>
        <div class="form-grid">
            <div class="form-group">
                <label for="productName">Product Name</label>
                <input type="text" id="productName" name="productName" required>
            </div>
            <div class="form-group">
                <label for="bisCertified">BIS Certified</label>
                <select id="bisCertified" name="bisCertified" required>
                    <option value="" disabled selected>Select...</option>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
        </div>

        <div class="section-title">Product Metrics</div>
        <div class="form-grid two-cols">
            <div class="form-group">
                <label for="productWeight">Product Weight (Grams)</label>
                <input type="number" step="0.01" id="productWeight" name="productWeight" required>
            </div>
            <div class="form-group">
                <label for="productCapacity">Product Capacity (Litres)</label>
                <input type="number" step="0.01" id="productCapacity" name="productCapacity" required>
            </div>
        </div>
        <div class="form-grid three-cols" style="margin-top: 16px;">
            <div class="form-group">
                <label for="productLength">Length (cm)</label>
                <input type="number" step="0.01" id="productLength" name="productLength" required>
            </div>
            <div class="form-group">
                <label for="productWidth">Width (cm)</label>
                <input type="number" step="0.01" id="productWidth" name="productWidth" required>
            </div>
            <div class="form-group">
                <label for="productHeight">Height (cm)</label>
                <input type="number" step="0.01" id="productHeight" name="productHeight" required>
            </div>
        </div>

        <div class="section-title">Package Metrics</div>
        <div class="form-grid two-cols">
            <div class="form-group">
                <label for="cartonBoxWeight">Carton Box Weight (Grams)</label>
                <input type="number" step="0.01" id="cartonBoxWeight" name="cartonBoxWeight" required>
            </div>
            <div class="form-group">
                <label for="packageWeight">Total Package Weight (Grams)</label>
                <input type="number" step="0.01" id="packageWeight" name="packageWeight" required>
            </div>
        </div>
        <div class="form-grid three-cols" style="margin-top: 16px;">
            <div class="form-group">
                <label for="packageLength">Length (cm)</label>
                <input type="number" step="0.01" id="packageLength" name="packageLength" required>
            </div>
            <div class="form-group">
                <label for="packageWidth">Width (cm)</label>
                <input type="number" step="0.01" id="packageWidth" name="packageWidth" required>
            </div>
            <div class="form-group">
                <label for="packageHeight">Height (cm)</label>
                <input type="number" step="0.01" id="packageHeight" name="packageHeight" required>
            </div>
        </div>

        <button type="submit" id="submit-btn">Submit Data</button>
        <div id="status-message" class="message"></div>
    </form>

    <div class="history-section" id="history-section">
        <div class="section-title" style="margin-top: 0;">Recent Submissions</div>
        <ul class="history-list" id="history-list">
            </ul>
    </div>
</div>

<script>
    // --- Theme Toggle Logic ---
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    
    const currentTheme = localStorage.getItem('theme') || 'light';
    if (currentTheme === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
        themeIcon.textContent = '☀️';
        themeToggle.innerHTML = '<span id="theme-icon">☀️</span> Light Mode';
    }

    themeToggle.addEventListener('click', () => {
        let theme = document.body.getAttribute('data-theme');
        if (theme === 'dark') {
            document.body.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            themeToggle.innerHTML = '<span id="theme-icon">🌙</span> Dark Mode';
        } else {
            document.body.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            themeToggle.innerHTML = '<span id="theme-icon">☀️</span> Light Mode';
        }
    });

    // --- History Logic ---
    const historySection = document.getElementById('history-section');
    const historyList = document.getElementById('history-list');
    
    // Load existing history from local storage or start fresh array
    let submissionHistory = JSON.parse(localStorage.getItem('warehouseHistory')) || [];

    function updateHistoryUI() {
        if (submissionHistory.length === 0) {
            historySection.style.display = 'none';
            return;
        }
        
        historySection.style.display = 'block';
        historyList.innerHTML = ''; // Clear current list
        
        submissionHistory.forEach(item => {
            const li = document.createElement('li');
            li.className = 'history-item';
            li.innerHTML = `
                <span class="history-name">📦 ${item.name}</span>
                <span class="history-time">${item.time}</span>
            `;
            historyList.appendChild(li);
        });
    }

    // Call once on page load to show any previous submissions
    updateHistoryUI();


    // --- Form Submission Logic ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyFDqcFxVo0TyAmu3RvqWn-jQKan8zR7D8ZAebvb_sJSZwdvLI9P1CVrAAi3HPUVk92/exec'; 
    const form = document.getElementById('dimensions-form');
    const submitBtn = document.getElementById('submit-btn');
    const statusMessage = document.getElementById('status-message');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // Capture the product name before resetting the form
        const currentProductName = document.getElementById('productName').value;
        
        submitBtn.disabled = true;
        submitBtn.innerText = 'Submitting...';
        statusMessage.className = 'message';
        statusMessage.innerText = '';

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                statusMessage.innerText = 'Success! Dimensions logged.';
                statusMessage.className = 'message success';
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit Data';
                
                // Update History Array
                const now = new Date();
                const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                // Add to beginning of array
                submissionHistory.unshift({ name: currentProductName, time: timeString });
                
                // Keep only the last 10 items
                if (submissionHistory.length > 10) {
                    submissionHistory.pop();
                }
                
                // Save to local storage and update UI
                localStorage.setItem('warehouseHistory', JSON.stringify(submissionHistory));
                updateHistoryUI();

                form.reset();
                setTimeout(() => { statusMessage.className = 'message'; }, 4000);
            })
            .catch(error => {
                console.error('Error!', error.message);
                statusMessage.innerText = 'Error saving data. Check connection.';
                statusMessage.className = 'message error';
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit Data';
            });
    });
</script>

</body>
</html>
